<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตกแต่งภาพ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&family=Chonburi&family=IBM+Plex+Sans+Thai:wght@400;700&family=Kanit:wght@400;700&family=Mali:wght@400;700&family=Mitr:wght@400;700&family=Noto+Sans+Thai:wght@400;700&family=Prompt:wght@400;700&family=Sarabun:wght@400;700&family=Sriracha&family=Roboto:wght@400;700&family=Playfair+Display:wght@400;700&family=Oswald:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&family=Lobster&family=Bebas+Neue&family=Merriweather:wght@400;700&family=Courier+Prime:wght@400;700&family=Abril+Fatface&family=Fredoka+One&family=Righteous&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: #16213e;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #0f3460;
}
header h1 { font-size: 22px; color: #e94560; }
header h1 span { color: #f5a623; }
.toolbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.container {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.sidebar {
  width: 280px;
  background: #16213e;
  padding: 16px;
  overflow-y: auto;
  border-right: 2px solid #0f3460;
  flex-shrink: 0;
}
.sidebar h3 {
  font-size: 14px;
  color: #f5a623;
  margin: 16px 0 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.sidebar h3:first-child { margin-top: 0; }
.sidebar label { display: block; font-size: 12px; margin: 6px 0 2px; color: #aaa; }
.sidebar input[type="range"] { width: 100%; margin-bottom: 4px; accent-color: #e94560; }
.sidebar .value-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
.canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: #0f0f23;
  position: relative;
  overflow: auto;
}
.canvas-area.drag-over { background: #1a1a3e; }
.canvas-placeholder {
  color: #555;
  text-align: center;
  cursor: pointer;
}
.canvas-placeholder svg { width: 80px; height: 80px; fill: #444; margin-bottom: 12px; }
.canvas-placeholder p { font-size: 16px; }
canvas#mainCanvas { max-width: 100%; max-height: 100%; border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5); display: none; }
button {
  background: #0f3460;
  color: #eee;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.2s;
}
button:hover { background: #e94560; }
button.active { background: #e94560; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 4px; }
.filter-grid button { font-size: 11px; padding: 6px; }
input[type="color"] { width: 100%; height: 36px; border: none; border-radius: 4px; cursor: pointer; background: transparent; }
#textInput { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 13px; margin-bottom: 4px; }
select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 13px; margin-bottom: 4px; cursor: pointer; }
select option { background: #1a1a2e; color: #eee; }
#textInput:focus { outline: none; border-color: #e94560; }
#fontSize { width: 100%; accent-color: #e94560; }
.sticker-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.sticker-grid button {
  font-size: 24px; padding: 8px; background: #1a1a2e; border: 1px solid #0f3460;
}
.sticker-grid button:hover { border-color: #e94560; background: #1a1a3e; }
.frame-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.frame-grid button { font-size: 11px; padding: 10px 6px; background: #1a1a2e; border: 1px solid #0f3460; }
.frame-grid button:hover { border-color: #e94560; }
.frame-grid button.active-frame { border-color: #e94560; background: #0f3460; }
footer {
  background: #16213e;
  padding: 10px 24px;
  display: flex;
  justify-content: center;
  gap: 12px;
  border-top: 2px solid #0f3460;
}
footer button { padding: 10px 24px; font-size: 14px; }
.btn-download { background: #e94560; }
.btn-download:hover { background: #c73650; }
.btn-reset { background: #333; }
.btn-reset:hover { background: #555; }
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>🖼️ <span>ตกแต่ง</span>ภาพ</h1>
  <div class="toolbar">
    <button onclick="document.getElementById('fileInput').click()">📁 เลือกรูป</button>
    <input type="file" id="fileInput" accept="image/*" hidden>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <h3>⚙️ ปรับแต่ง</h3>
    <label>ความสว่าง</label>
    <div class="value-row"><span>0</span><span id="brightnessVal">100</span></div>
    <input type="range" id="brightness" min="0" max="200" value="100">

    <label>คอนทราสต์</label>
    <div class="value-row"><span>0</span><span id="contrastVal">100</span></div>
    <input type="range" id="contrast" min="0" max="200" value="100">

    <label>ความอิ่มสี</label>
    <div class="value-row"><span>0</span><span id="saturateVal">100</span></div>
    <input type="range" id="saturate" min="0" max="200" value="100">

    <label>ความคมชัด</label>
    <div class="value-row"><span>0</span><span id="blurVal">0</span></div>
    <input type="range" id="blur" min="0" max="10" value="0" step="0.5">

    <label>หมุน (องศา)</label>
    <div class="value-row"><span>0</span><span id="rotateVal">0</span></div>
    <input type="range" id="rotate" min="0" max="360" value="0">

    <div class="btn-row">
      <button onclick="resetAdjustments()" class="btn-sm">รีเซ็ต</button>
    </div>

    <h3>🎨 ฟิลเตอร์</h3>
    <div class="filter-grid">
      <button onclick="applyFilter('none')">ปกติ</button>
      <button onclick="applyFilter('grayscale')">ขาวดำ</button>
      <button onclick="applyFilter('sepia')">ซีเปีย</button>
      <button onclick="applyFilter('invert')">กลับสี</button>
      <button onclick="applyFilter('warm')">อบอุ่น</button>
      <button onclick="applyFilter('cool')">เย็น</button>
      <button onclick="applyFilter('vintage')">วินเทจ</button>
      <button onclick="applyFilter('dramatic')">ดราม่า</button>
    </div>

    <h3>🖌️ วางข้อความ</h3>
    <input type="text" id="textInput" placeholder="พิมพ์ข้อความ...">
    <label>ขนาด</label>
    <input type="range" id="fontSize" min="12" max="80" value="36">
    <div class="value-row"><span>12</span><span id="fontSizeVal">36</span></div>
    <label>สี</label>
    <input type="color" id="textColor" value="#ffffff">
    <label>ฟอนต์</label>
    <select id="fontSelect">
      <optgroup label="🇹🇭 ไทย">
        <option value="Sarabun" style="font-family:Sarabun">Sarabun</option>
        <option value="Prompt" style="font-family:Prompt">Prompt</option>
        <option value="Kanit" style="font-family:Kanit">Kanit</option>
        <option value="Mitr" style="font-family:Mitr">Mitr</option>
        <option value="Mali" style="font-family:Mali">Mali</option>
        <option value="Sriracha" style="font-family:Sriracha">Sriracha</option>
        <option value="Chonburi" style="font-family:Chonburi">Chonburi</option>
        <option value="Noto Sans Thai" style="font-family:'Noto Sans Thai'">Noto Sans Thai</option>
        <option value="IBM Plex Sans Thai" style="font-family:'IBM Plex Sans Thai'">IBM Plex Sans Thai</option>
        <option value="Anuphan" style="font-family:Anuphan">Anuphan</option>
      </optgroup>
      <optgroup label="🇬🇧 อังกฤษ">
        <option value="Roboto" style="font-family:Roboto">Roboto</option>
        <option value="Playfair Display" style="font-family:'Playfair Display'">Playfair Display</option>
        <option value="Oswald" style="font-family:Oswald">Oswald</option>
        <option value="Dancing Script" style="font-family:'Dancing Script'">Dancing Script</option>
        <option value="Pacifico" style="font-family:Pacifico">Pacifico</option>
        <option value="Lobster" style="font-family:Lobster">Lobster</option>
        <option value="Bebas Neue" style="font-family:'Bebas Neue'">Bebas Neue</option>
        <option value="Merriweather" style="font-family:Merriweather">Merriweather</option>
        <option value="Courier Prime" style="font-family:'Courier Prime'">Courier Prime</option>
        <option value="Abril Fatface" style="font-family:'Abril Fatface'">Abril Fatface</option>
        <option value="Fredoka One" style="font-family:'Fredoka One'">Fredoka One</option>
        <option value="Righteous" style="font-family:Righteous">Righteous</option>
        <option value="Unbounded" style="font-family:Unbounded">Unbounded</option>
      </optgroup>
    </select>
    <div class="btn-row">
      <button onclick="addText()" class="btn-sm">➕ เพิ่มข้อความ</button>
    </div>

    <h3>⭐ สติกเกอร์</h3>
    <div class="sticker-grid">
      <button onclick="addSticker('❤️')">❤️</button>
      <button onclick="addSticker('⭐')">⭐</button>
      <button onclick="addSticker('🔥')">🔥</button>
      <button onclick="addSticker('💎')">💎</button>
      <button onclick="addSticker('🌈')">🌈</button>
      <button onclick="addSticker('🎉')">🎉</button>
      <button onclick="addSticker('🌸')">🌸</button>
      <button onclick="addSticker('🦋')">🦋</button>
      <button onclick="addSticker('✨')">✨</button>
      <button onclick="addSticker('💫')">💫</button>
      <button onclick="addSticker('🌟')">🌟</button>
      <button onclick="addSticker('🎀')">🎀</button>
      <button onclick="addSticker('🌺')">🌺</button>
      <button onclick="addSticker('🍀')">🍀</button>
      <button onclick="addSticker('💜')">💜</button>
    </div>

    <h3>🖼️ กรอบ</h3>
    <div class="frame-grid">
      <button onclick="setFrame('none')" class="active-frame">ไม่มี</button>
      <button onclick="setFrame('thin')">เส้นบาง</button>
      <button onclick="setFrame('thick')">เส้นหนา</button>
      <button onclick="setFrame('double')">สองชั้น</button>
      <button onclick="setFrame('shadow')">เงา</button>
      <button onclick="setFrame('rounded')">มุมมน</button>
      <button onclick="setFrame('neon')">นีออน</button>
      <button onclick="setFrame('vintage')">วินเทจ</button>
    </div>
  </div>

  <div class="canvas-area" id="canvasArea">
    <div class="canvas-placeholder" id="placeholder" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      <p>คลิกเพื่อเลือกรูปภาพ<br>หรือลากไฟล์มาวาง</p>
    </div>
    <canvas id="mainCanvas"></canvas>
  </div>
</div>

<footer>
  <button onclick="resetAll()" class="btn-reset">🔄 เริ่มใหม่</button>
  <button onclick="downloadImage()" class="btn-download">💾 ดาวน์โหลด</button>
</footer>

<script>
// ============ State ============
let originalImage = null; // Original unmodified Image
let sourceImage = null;   // Current source (Image or Canvas) to draw
let decorations = [];
let currentFrame = 'none';
let selectedIndex = -1;
let dragItem = null;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const placeholder = document.getElementById('placeholder');
const canvasArea = document.getElementById('canvasArea');

// ============ File Handling ============
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadImage(file);
});

canvasArea.addEventListener('dragover', (e) => { e.preventDefault(); canvasArea.classList.add('drag-over'); });
canvasArea.addEventListener('dragleave', () => { canvasArea.classList.remove('drag-over'); });
canvasArea.addEventListener('drop', (e) => {
  e.preventDefault();
  canvasArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      sourceImage = img;
      canvas.width = img.width;
      canvas.height = img.height;
      placeholder.style.display = 'none';
      canvas.style.display = 'block';
      resetAll();
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ============ Helpers ============
function getFontStr(dec) {
  if (dec.type === 'sticker') {
    return `${dec.fontSize}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
  }
  return `${dec.fontSize}px '${dec.font}', 'Segoe UI', Tahoma, sans-serif`;
}

function getText(dec) {
  return dec.type === 'sticker' ? dec.sticker : dec.text;
}

function getDecBounds(dec) {
  ctx.font = getFontStr(dec);
  ctx.textBaseline = 'top';
  const metrics = ctx.measureText(getText(dec));
  return { w: metrics.width, h: dec.fontSize * 1.3 };
}

function hitTest(mx, my) {
  for (let i = decorations.length - 1; i >= 0; i--) {
    const dec = decorations[i];
    const b = getDecBounds(dec);
    if (mx >= dec.x && mx <= dec.x + b.w && my >= dec.y && my <= dec.y + b.h) {
      return i;
    }
  }
  return -1;
}

// ============ Rendering ============
function render() {
  if (!sourceImage) return;

  const brightness = document.getElementById('brightness').value;
  const contrast = document.getElementById('contrast').value;
  const saturate = document.getElementById('saturate').value;
  const blur = document.getElementById('blur').value;
  const rotate = document.getElementById('rotate').value;

  ctx.save();
  ctx.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturate}%) blur(${blur}px)`;

  const w = sourceImage.width, h = sourceImage.height;
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rotate * Math.PI / 180);
  ctx.drawImage(sourceImage, -w / 2, -h / 2, w, h);
  ctx.restore();

  // Draw decorations
  decorations.forEach((dec, i) => {
    ctx.font = getFontStr(dec);
    ctx.textBaseline = 'top';
    if (dec.type === 'text') {
      ctx.fillStyle = dec.color;
    }
    ctx.fillText(getText(dec), dec.x, dec.y);

    // Selection highlight
    if (i === selectedIndex) {
      const b = getDecBounds(dec);
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(dec.x - 3, dec.y - 3, b.w + 6, b.h + 6);
      ctx.setLineDash([]);
    }
  });

  drawFrame();
}

function drawFrame() {
  if (currentFrame === 'none') return;
  const w = canvas.width, h = canvas.height;

  if (currentFrame === 'thin') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, w - 4, h - 4);
  } else if (currentFrame === 'thick') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 12;
    ctx.strokeRect(6, 6, w - 12, h - 12);
  } else if (currentFrame === 'double') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.strokeRect(4, 4, w - 8, h - 8);
    ctx.strokeRect(14, 14, w - 28, h - 28);
  } else if (currentFrame === 'shadow') {
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(2, 2, w - 4, h - 4);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
  } else if (currentFrame === 'rounded') {
    const r = 40;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(w - r, 0);
    ctx.quadraticCurveTo(w, 0, w, r);
    ctx.lineTo(w, h - r);
    ctx.quadraticCurveTo(w, h, w - r, h);
    ctx.lineTo(r, h);
    ctx.quadraticCurveTo(0, h, 0, h - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.stroke();
  } else if (currentFrame === 'neon') {
    ctx.shadowColor = '#e94560';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, w - 4, h - 4);
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
  } else if (currentFrame === 'vintage') {
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, w - 8, h - 8);
    ctx.strokeStyle = '#D2B48C';
    ctx.lineWidth = 3;
    ctx.strokeRect(2, 2, w - 4, h - 4);
  }
}

// ============ Live Adjustments ============
['brightness', 'contrast', 'saturate', 'blur', 'rotate'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const val = document.getElementById(id).value;
    const valEl = document.getElementById(id + 'Val');
    if (valEl) valEl.textContent = val;
    render();
  });
});

document.getElementById('fontSize').addEventListener('input', () => {
  document.getElementById('fontSizeVal').textContent = document.getElementById('fontSize').value;
});

// ============ Filters ============
function applyFilter(filter) {
  if (!originalImage) return;
  let b = 100, c = 100, s = 100;

  switch (filter) {
    case 'none': break;
    case 'grayscale': s = 0; break;
    case 'sepia': b = 110; c = 110; s = 80; break;
    case 'invert': b = 100; c = 150; s = 100; break;
    case 'warm': s = 130; b = 105; break;
    case 'cool': s = 70; b = 95; break;
    case 'vintage': b = 90; c = 80; s = 60; break;
    case 'dramatic': c = 150; s = 120; b = 90; break;
  }

  document.getElementById('brightness').value = b;
  document.getElementById('contrast').value = c;
  document.getElementById('saturate').value = s;
  document.getElementById('brightnessVal').textContent = b;
  document.getElementById('contrastVal').textContent = c;
  document.getElementById('saturateVal').textContent = s;
  render();
}

// ============ Decorations ============
function addText() {
  if (!sourceImage) return;
  const text = document.getElementById('textInput').value.trim();
  if (!text) return;
  const fontSize = parseInt(document.getElementById('fontSize').value);
  const color = document.getElementById('textColor').value;
  const font = document.getElementById('fontSelect').value;
  decorations.push({ type: 'text', text, x: 40, y: 40, fontSize, color, font });
  selectedIndex = decorations.length - 1;
  render();
}

function addSticker(sticker) {
  if (!sourceImage) return;
  const pos = getNextFreePos();
  decorations.push({ type: 'sticker', sticker, x: pos.x, y: pos.y, fontSize: 40 });
  selectedIndex = decorations.length - 1;
  render();
}

function getNextFreePos() {
  const baseX = 40, baseY = 40;
  for (let attempt = 0; attempt < 20; attempt++) {
    const x = baseX + attempt * 50;
    const y = baseY + attempt * 30;
    let occupied = false;
    for (const d of decorations) {
      const b = getDecBounds(d);
      if (Math.abs(d.x - x) < b.w + 10 && Math.abs(d.y - y) < b.h + 10) { occupied = true; break; }
    }
    if (!occupied) return { x, y };
  }
  return { x: baseX + Math.random() * 100, y: baseY + Math.random() * 100 };
}

function deleteSelected() {
  if (selectedIndex < 0 || selectedIndex >= decorations.length) return;
  decorations.splice(selectedIndex, 1);
  selectedIndex = -1;
  dragItem = null;
  render();
}

// ============ Frame ============
function setFrame(frame) {
  currentFrame = frame;
  document.querySelectorAll('.frame-grid button').forEach(b => b.classList.remove('active-frame'));
  document.querySelector(`.frame-grid button[onclick*="${frame}"]`)?.classList.add('active-frame');
  render();
}

// ============ Canvas Interaction ============
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('mousedown', (e) => {
  const pos = getMousePos(e);
  const hit = hitTest(pos.x, pos.y);

  if (hit >= 0) {
    selectedIndex = hit;
    dragItem = { index: hit, offsetX: pos.x - decorations[hit].x, offsetY: pos.y - decorations[hit].y };
    render();
  } else {
    selectedIndex = -1;
    render();
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragItem) return;
  const pos = getMousePos(e);
  const dec = decorations[dragItem.index];
  dec.x = pos.x - dragItem.offsetX;
  dec.y = pos.y - dragItem.offsetY;
  render();
});

window.addEventListener('mouseup', () => { dragItem = null; });

// ============ Reset ============
function resetAdjustments() {
  document.getElementById('brightness').value = 100;
  document.getElementById('contrast').value = 100;
  document.getElementById('saturate').value = 100;
  document.getElementById('blur').value = 0;
  document.getElementById('rotate').value = 0;
  document.getElementById('brightnessVal').textContent = '100';
  document.getElementById('contrastVal').textContent = '100';
  document.getElementById('saturateVal').textContent = '100';
  document.getElementById('blurVal').textContent = '0';
  document.getElementById('rotateVal').textContent = '0';
  render();
}

function resetAll() {
  decorations = [];
  selectedIndex = -1;
  dragItem = null;
  currentFrame = 'none';
  document.querySelectorAll('.frame-grid button').forEach(b => b.classList.remove('active-frame'));
  document.querySelector('.frame-grid button:first-child')?.classList.add('active-frame');
  document.getElementById('textInput').value = '';
  document.getElementById('fontSize').value = 36;
  document.getElementById('fontSizeVal').textContent = '36';
  document.getElementById('textColor').value = '#ffffff';
  document.getElementById('fontSelect').value = 'Sarabun';
  resetAdjustments();
  render();
}

// ============ Download ============
function downloadImage() {
  if (!sourceImage) return;
  const link = document.createElement('a');
  link.download = 'decorated-image.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ============ Keyboard ============
document.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedIndex >= 0) {
      e.preventDefault();
      deleteSelected();
    }
  }
});
</script>

</body>
</html>
